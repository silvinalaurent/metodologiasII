name: CI — Linting y Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Checkstyle + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Checkstyle se ejecuta automáticamente en la fase "validate"
      # Si hay violaciones de estilo, el build falla aquí antes de compilar
      - name: Verificar estilo de código (Checkstyle)
        run: mvn validate --no-transfer-progress

      - name: Compilar y ejecutar tests
        run: mvn test --no-transfer-progress

      - name: Subir reporte de Checkstyle
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
