name: Java CI con Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio
    - uses: actions/checkout@v4

    # 2. Configura el entorno de Java (JDK)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # Distribución recomendada y estable
        cache: 'maven'          # Acelera futuras ejecuciones guardando dependencias

    # 3. Compila el proyecto
    - name: Compile Manual
      run: |
        mkdir -p bin
        javac -d bin src/*.java

    # 4. Ejecuta los tests (si tienes) o empaqueta
    - name: Run Tests
      run: mvn -B test
